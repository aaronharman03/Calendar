<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.png" />
  <base href="/Calendar/">

  <title>Simple Calendar</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
    }
    header {
      background: #007bff;
      color: white;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      flex-grow: 1;
      text-align: center;
    }
   .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
    }
   .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #ccc;
    }
   .calendar-grid > div {
      background: white;
      padding: 10px;
      text-align: right;
      min-height: 80px;
      cursor: pointer;
      position: relative;
    }
   .day-name {
      background: #eee;
      font-weight: bold;
      text-align: center;
    }
   .today {
      background: #d0eaff;
    }
    #dailyView {
      display: none;
      padding: 1rem;
    }
    #tasksList.taskRow {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
   .repeat-badge {
      font-size: 0.75rem;
      background: #28a745;
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 8px;
    }
    #addEventForm {
      display: none;
      margin-top: 1rem;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
    }
    #descModal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }
    #descModalContent {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      width: 90%;
      position: relative;
    }
    #menuOptions button:hover {
      background: #f0f0f0;
    }
   .date-number {
      font-weight: bold;
    }
    /* Login area styling */
    #loginDiv {
      padding: 1rem;
      background: #eee;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #loginDiv input {
      padding: 8px;
      font-size: 16px;
      flex-grow: 1;
      min-width: 180px;
    }
    #loginDiv button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    /* New flex container for dailyView top buttons */
    #dailyViewTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1rem 1rem 1rem;
    }
    #dailyViewTop button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 0;
    }
    /* Repeat days styling */
   .repeat-days {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
   .repeat-days label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      background: #f5f5f5;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
   .repeat-days input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
   .event-dot {
      background-color: #007bff;
      border-radius: 50%;
      width: 8px;
      height: 8px;
      display: inline-block;
      margin-left: 5px;
      vertical-align: middle;
    }
   .repeat-dot {
      background-color: #28a745;
    }
  </style>
</head>
<body>

<!-- LOGIN FORM -->
<div id="loginDiv">
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
  <button id="logoutBtn" style="display:none; margin-left: 1rem;">Logout</button>
</div>

<!-- APP CONTAINER -->
<div id="appDiv" style="display:none;">

<header>
  <button id="prevMonth">&lt;</button>
  <h1 id="monthYear">Month Year</h1>
  <button id="nextMonth">&gt;</button>
</header>

<div id="calendarView">
  <div class="calendar-grid" id="calendar"></div>
</div>

<div id="dailyView">
  <div id="dailyViewTop">
    <button id="backToMonth">← Back to Month</button>
    <button id="showFormBtn">+ Add Task</button>
  </div>

  <h2 id="dailyDateTitle" style="display:none;">Selected Date</h2>
  <div id="tasksList"></div>

  <form id="addEventForm">
    <h3 id="formTitle">Add Task</h3>
    <label>Time:</label>
    <input type="time" id="eventTime" required />
    <label>Title:</label>
    <input type="text" id="eventTitle" required />
    <label>Description:</label>
    <textarea id="eventDesc" rows="4"></textarea>

    <label>Repeat on:</label>
    <div class="repeat-days">
      <label><input type="checkbox" name="repeatDay" value="0"> Sun</label>
      <label><input type="checkbox" name="repeatDay" value="1"> Mon</label>
      <label><input type="checkbox" name="repeatDay" value="2"> Tue</label>
      <label><input type="checkbox" name="repeatDay" value="3"> Wed</label>
      <label><input type="checkbox" name="repeatDay" value="4"> Thu</label>
      <label><input type="checkbox" name="repeatDay" value="5"> Fri</label>
      <label><input type="checkbox" name="repeatDay" value="6"> Sat</label>
    </div>

    <button type="submit">Save</button>
  </form>
</div>

<div id="descModal">
  <div id="descModalContent">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3 id="descTitle" style="margin: 0;"></h3>
      <div style="position: relative;">
        <button id="menuBtn" style="background: none; border: none; font-size: 1.5em; cursor: pointer;">⋯</button>
        <div id="menuOptions" style="display: none; position: absolute; right: 0; background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);">
          <button id="editBtn" style="display:block; width:100%; padding: 5px 10px; border: none; background: white; text-align: left; cursor: pointer;">Edit</button>
          <button id="deleteBtn" style="display:block; width:100%; padding: 5px 10px; border: none; background: white; text-align: left; cursor: pointer; color: red;">Delete</button>
        </div>
      </div>
    </div>
    <p id="descText" style="margin-top: 10px;"></p>
    <p id="repeatText" style="margin-top: 10px; color: #28a745; font-size: 0.9rem;"></p>
    <button id="closeDescModal">Close</button>
  </div>
</div>

</div> <!-- end of appDiv -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_u0nBXgOfoeK8O9OyZVXlpSF9_v7ovQU",
    authDomain: "calendar-52769.firebaseapp.com",
    projectId: "calendar-52769",
    storageBucket: "calendar-52769.appspot.com",
    messagingSenderId: "780853682335",
    appId: "1:780853682335:web:0fcf319dd572c494bb02aa",
    measurementId: "G-31LD4E1PGE"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // DOM references for auth and UI
  const loginDiv = document.getElementById("loginDiv");
  const appDiv = document.getElementById("appDiv");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  loginBtn.addEventListener("click", () => {
    const email = emailInput.value;
    const password = passwordInput.value;
    signInWithEmailAndPassword(auth, email, password)
     .then(() => {
        console.log("Logged in");
      })
     .catch(e => alert("Login failed: " + e.message));
  });

  signupBtn.addEventListener("click", () => {
    const email = emailInput.value;
    const password = passwordInput.value;
    createUserWithEmailAndPassword(auth, email, password)
     .then(() => {
        alert("Signup successful. Please login.");
      })
     .catch(e => alert("Signup failed: " + e.message));
  });

  logoutBtn.addEventListener("click", () => {
    signOut(auth);
  });

  onAuthStateChanged(auth, user => {
    if(user) {
      loginDiv.style.display = "none";
      appDiv.style.display = "block";
      logoutBtn.style.display = "inline-block";
      currentUser = user;
      loadUserData().then(() => renderCalendar());
    } else {
      loginDiv.style.display = "flex";
      appDiv.style.display = "none";
      logoutBtn.style.display = "none";
      currentUser = null;
    }
  });

  // Calendar variables
  let currentUser = null;
  let currentYear, currentMonth; // for month view
  let selectedDate; // for daily view
  let events = {}; // cached events - structure: { "YYYY-MM-DD": { id: event }, "repeating": { id: event } }
  let editingEventId = null; // for edits
  let editingEventIsRepeating = false;

  // DOM references for calendar
  const monthYearEl = document.getElementById("monthYear");
  const calendarEl = document.getElementById("calendar");
  const prevMonthBtn = document.getElementById("prevMonth");
  const nextMonthBtn = document.getElementById("nextMonth");
  const calendarView = document.getElementById("calendarView");
  const dailyView = document.getElementById("dailyView");
  const dailyDateTitle = document.getElementById("dailyDateTitle");
  const backToMonthBtn = document.getElementById("backToMonth");
  const showFormBtn = document.getElementById("showFormBtn");
  const tasksList = document.getElementById("tasksList");
  const addEventForm = document.getElementById("addEventForm");
  const eventTimeInput = document.getElementById("eventTime");
  const eventTitleInput = document.getElementById("eventTitle");
  const eventDescInput = document.getElementById("eventDesc");
  const formTitle = document.getElementById("formTitle");

  // Modal elements
  const descModal = document.getElementById("descModal");
  const descTitle = document.getElementById("descTitle");
  const descText = document.getElementById("descText");
  const repeatText = document.getElementById("repeatText");
  const closeDescModalBtn = document.getElementById("closeDescModal");
  const menuBtn = document.getElementById("menuBtn");
  const menuOptions = document.getElementById("menuOptions");
  const editBtn = document.getElementById("editBtn");
  const deleteBtn = document.getElementById("deleteBtn");

  // Initialize to today
  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();

  // Load user data
  async function loadUserData() {
    if(!currentUser) return;
    const docRef = doc(db, "calendars", currentUser.uid);
    const docSnap = await getDoc(docRef);
    if(docSnap.exists()) {
      events = docSnap.data();
      if (!events.repeating) events.repeating = {};
    } else {
      events = { repeating: {} };
    }
  }

  // Save user data
  async function saveUserData() {
    if(!currentUser) return;
    const docRef = doc(db, "calendars", currentUser.uid);
    await setDoc(docRef, events);
  }

  // Get all events for a specific date, including repeating ones
  function getEventsForDate(date) {
    const dateStr = formatDate(date);
    const dayOfWeek = date.getDay(); // 0 = Sunday
    let dayEvents = [];

    // Add one-time events for this date
    if (events[dateStr]) {
      Object.entries(events[dateStr]).forEach(([id, event]) => {
        dayEvents.push({ id,...event, isRepeating: false });
      });
    }

    // Add repeating events that match this day of week
    if (events.repeating) {
      Object.entries(events.repeating).forEach(([id, event]) => {
        if (event.repeatDays && event.repeatDays.includes(dayOfWeek)) {
          // Only show if start date is before or on this date
          if (!event.startDate || event.startDate <= dateStr) {
            dayEvents.push({ id,...event, isRepeating: true });
          }
        }
      });
    }

    return dayEvents.sort((a, b) => a.time.localeCompare(b.time));
  }

  // Render month calendar
  function renderCalendar() {
    calendarView.style.display = "block";
    dailyView.style.display = "none";

    prevMonthBtn.style.display = "inline-block";
    nextMonthBtn.style.display = "inline-block";

    const firstDay = new Date(currentYear, currentMonth, 1);
    const lastDay = new Date(currentYear, currentMonth + 1, 0);
    const startDayOfWeek = firstDay.getDay();
    const daysInMonth = lastDay.getDate();

    monthYearEl.textContent = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });
