<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Simple Calendar with Smart Repeats</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      overflow: hidden;
      font-family: sans-serif;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    header {
      background: #007bff;
      color: white;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 68px;
      box-sizing: border-box;
    }
    header h1 { margin: 0; font-size: 1.5rem; flex-grow: 1; text-align: center; }
    #loginDiv {
      padding: 1rem;
      background: #eee;
      position: fixed;
      top: 68px; left: 0; right: 0;
      z-index: 19;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #loginDiv input { padding: 8px; font-size: 16px; flex-grow: 1; min-width: 180px; touch-action: manipulation; }
    #loginDiv button { padding: 8px 16px; font-size: 16px; cursor: pointer; touch-action: manipulation; }
    #appDiv {
      position: fixed;
      top: 68px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    #calendarView {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ccc; }
    .calendar-grid > div { background: white; padding: 10px; text-align: right; min-height: 80px; cursor: pointer; }
    .day-name { background: #eee; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 5; }
    .today { background: #d0eaff; }
    #dailyView {
      display: none;
      height: 100%;
      background: #f0f0f0;
      overflow: hidden;
    }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; font-size: 16px; touch-action: manipulation; }
    button { margin-top: 10px; padding: 8px 12px; cursor: pointer; font-size: 16px; touch-action: manipulation; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modalContent { background: white; padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; position: relative; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
    #menuOptions button:hover { background: #f0f0f0; }
    .date-number { font-weight: bold; }
    #dailyViewTop {
      position: fixed;
      top: 68px; left: 0; right: 0;
      z-index: 15;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      height: 60px;
      box-sizing: border-box;
    }
    #dailyViewTop button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 0;
    }
    #tasksList {
      position: absolute;
      top: 60px; bottom: 0; left: 0; right: 0;
      background: #fff;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #tasksListInner {
      position: relative;
      height: 1440px;
    }
    .hour-line {
      position: absolute;
      left: 50px; right: 0;
      border-top: 1px solid #eee;
      height: 60px;
      pointer-events: none;
    }
    .hour-label {
      position: absolute;
      left: -46px;
      top: -8px;
      font-size: 11px;
      color: #666;
      width: 40px;
      text-align: right;
    }
    .event-block {
      position: absolute;
      border-radius: 4px;
      padding: 2px 6px;
      color: white;
      font-size: 14px;
      line-height: 1.2;
      overflow: hidden;
      cursor: pointer;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.1);
      min-height: 20px;
      display: flex;
      align-items: center;
      word-break: break-all;
    }
    .event-block:hover { opacity: 0.9; }
    
    .repeat-days-container { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 6px; 
      margin-top: 5px; 
    }
    .repeat-day-label { display: inline-flex; align-items: center; justify-content: center; background: #e0e0e0; padding: 6px 0; border-radius: 4px; font-weight: normal; font-size: 14px; cursor: pointer; user-select: none; margin-top: 0; }
    .repeat-day-label input { width: auto; margin-right: 5px; margin-top: 0; }
    .repeat-interval-row { display:flex; gap:10px; align-items:center; margin-top: 5px; }
    #repeatInterval { width: 80px; }
    
    .time-row { 
      display: flex; 
      justify-content: space-between; 
    }
    .time-row > div { 
      width: calc(50% - 6px); 
    }
    .form-buttons { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

<header>
  <button id="prevMonth">&lt;</button>
  <h1 id="monthYear">Month Year</h1>
  <button id="nextMonth">&gt;</button>
</header>

<div id="loginDiv">
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
  <button id="logoutBtn" style="display:none; margin-left: 1rem;">Logout</button>
</div>

<div id="appDiv" style="display:none;">

  <div id="calendarView">
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <div id="dailyView">
    <div id="dailyViewTop">
      <button id="backToMonth">← Back to Month</button>
      <button id="showFormBtn">+ Add Task</button>
    </div>
    <div id="tasksList">
      <div id="tasksListInner"></div>
    </div>
  </div>

  <div id="formModal" class="modal">
    <div class="modalContent">
      <h3 id="formTitle">Add Task</h3>
      <form id="addEventForm">
        <div class="time-row">
          <div>
            <label>Start Time:</label>
            <input type="time" id="eventStartTime" required />
          </div>
          <div>
            <label>End Time:</label>
            <input type="time" id="eventEndTime" required />
          </div>
        </div>
        <label>Title:</label>
        <input type="text" id="eventTitle" required />
        <label>Color:</label>
        <input type="color" id="eventColor" value="#4285f4" />
        <label>Description:</label>
        <textarea id="eventDesc" rows="4"></textarea>
        <label>Repeat on Days:</label>
        <div class="repeat-days-container">
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="0">Sun</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="1">Mon</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="2">Tue</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="3">Wed</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="4">Thu</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="5">Fri</label>
          <label class="repeat-day-label"><input type="checkbox" name="repeatDays" value="6">Sat</label>
        </div>
        <label>Or Repeat Every:</label>
        <div class="repeat-interval-row">
          <input type="number" id="repeatInterval" min="1" placeholder="X" />
          <span>days</span>
        </div>
        <label>Repeat End Date (optional):</label>
        <input type="date" id="repeatEndDate" />
        <small style="color:#666;">Leave blank for 1 year from start date</small>
        <div class="form-buttons">
          <button type="button" id="cancelFormBtn">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="descModal" class="modal">
    <div class="modalContent">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 id="descTitle" style="margin: 0;"></h3>
        <div style="position: relative;">
          <button id="menuBtn" style="background: none; border: none; font-size: 1.5em; cursor: pointer;">⋯</button>
          <div id="menuOptions" style="display: none; position: absolute; right: 0; background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);">
            <button id="editBtn" style="display:block; width:100%; padding: 5px 10px; border: none; background: white; text-align: left; cursor: pointer;">Edit</button>
            <button id="deleteBtn" style="display:block; width:100%; padding: 5px 10px; border: none; background: white; text-align: left; cursor: pointer; color: red;">Delete</button>
          </div>
        </div>
      </div>
      <p id="descText" style="margin-top: 10px;"></p>
      <button id="closeDescModal">Close</button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDoc, getDocs,
    setDoc, deleteDoc, writeBatch, query, where
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_u0nBXgOfoeK8O9OyZVXlpSF9_v7ovQU",
    authDomain: "calendar-52769.firebaseapp.com",
    projectId: "calendar-52769",
    storageBucket: "calendar-52769.appspot.com",
    messagingSenderId: "780853682335",
    appId: "1:780853682335:web:0fcf319dd572c494bb02aa",
    measurementId: "G-31LD4E1PGE"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  function tasksCol() {
    return collection(db, "users", currentUser.uid, "tasks");
  }

  async function saveTask(id, taskData) {
    await setDoc(doc(tasksCol(), id), taskData);
  }

  async function deleteTask(id) {
    await deleteDoc(doc(tasksCol(), id));
  }

  async function loadMonth(year, month) {
    const prefix = `${year}-${String(month + 1).padStart(2, "0")}`;
    const q = query(tasksCol(), where("date", ">=", prefix + "-01"), where("date", "<=", prefix + "-31"));
    const snap = await getDocs(q);
    Object.keys(events).forEach(d => { if (d.startsWith(prefix)) delete events[d]; });
    snap.forEach(docSnap => {
      const task = docSnap.data();
      if (!events[task.date]) events[task.date] = {};
      events[task.date][docSnap.id] = task;
    });
  }

  async function deleteSeriesByGroupId(groupId) {
    const q = query(tasksCol(), where("repeatGroupId", "==", groupId));
    const snap = await getDocs(q);
    const batch = writeBatch(db);
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    Object.keys(events).forEach(dateKey => {
      Object.keys(events[dateKey]).forEach(taskKey => {
        if (events[dateKey][taskKey].repeatGroupId === groupId) delete events[dateKey][taskKey];
      });
      if (Object.keys(events[dateKey]).length === 0) delete events[dateKey];
    });
  }

  async function updateSeriesByGroupId(groupId, changes) {
    const q = query(tasksCol(), where("repeatGroupId", "==", groupId));
    const snap = await getDocs(q);
    const batch = writeBatch(db);
    snap.forEach(d => batch.update(d.ref, changes));
    await batch.commit();
    Object.keys(events).forEach(dateKey => {
      Object.keys(events[dateKey]).forEach(taskKey => {
        if (events[dateKey][taskKey].repeatGroupId === groupId) {
          Object.assign(events[dateKey][taskKey], changes);
        }
      });
    });
  }

  const loginDiv = document.getElementById("loginDiv");
  const appDiv = document.getElementById("appDiv");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  document.getElementById("loginBtn").addEventListener("click", () => {
    signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
.catch(e => alert("Login failed: " + e.message));
  });

  document.getElementById("signupBtn").addEventListener("click", () => {
    createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
.then(() => alert("Signup successful. Please login."))
.catch(e => alert("Signup failed: " + e.message));
  });

  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    if (user) {
      loginDiv.style.display = "none";
      appDiv.style.display = "block";
      document.getElementById("logoutBtn").style.display = "inline-block";
      currentUser = user;
      await loadMonth(currentYear, currentMonth);
      renderCalendar();
    } else {
      loginDiv.style.display = "flex";
      appDiv.style.display = "none";
      document.getElementById("logoutBtn").style.display = "none";
      currentUser = null;
      events = {};
    }
  });

  let currentUser = null;
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null;
  let editingEventId = null;
  let events = {};

  const monthYearEl = document.getElementById("monthYear");
  const calendarEl = document.getElementById("calendar");
  const calendarView = document.getElementById("calendarView");
  const dailyView = document.getElementById("dailyView");
  const backToMonthBtn = document.getElementById("backToMonth");
  const showFormBtn = document.getElementById("showFormBtn");
  const tasksList = document.getElementById("tasksList");
  const tasksListInner = document.getElementById("tasksListInner");
  const formModal = document.getElementById("formModal");
  const addEventForm = document.getElementById("addEventForm");
  const eventStartTimeInput = document.getElementById("eventStartTime");
  const eventEndTimeInput = document.getElementById("eventEndTime");
  const eventTitleInput= document.getElementById("eventTitle");
  const eventColorInput = document.getElementById("eventColor");
  const eventDescInput = document.getElementById("eventDesc");
  const repeatIntervalInput = document.getElementById("repeatInterval");
  const repeatEndDateInput = document.getElementById("repeatEndDate");
  const formTitle = document.getElementById("formTitle");
  const cancelFormBtn = document.getElementById("cancelFormBtn");
  const descModal = document.getElementById("descModal");
  const descTitle = document.getElementById("descTitle");
  const descText = document.getElementById("descText");
  const menuOptions = document.getElementById("menuOptions");

  function renderCalendar() {
    calendarView.style.display = "block";
    dailyView.style.display = "none";
    document.getElementById("prevMonth").style.display = "inline-block";
    document.getElementById("nextMonth").style.display = "inline-block";

    const firstDay = new Date(currentYear, currentMonth, 1);
    const lastDay = new Date(currentYear, currentMonth + 1, 0);

    monthYearEl.textContent = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });
    calendarEl.innerHTML = "";

    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(name => {
      const d = document.createElement("div");
      d.classList.add("day-name");
      d.textContent = name;
      calendarEl.appendChild(d);
    });

    for (let i = 0; i < firstDay.getDay(); i++) calendarEl.appendChild(document.createElement("div"));

    for (let day = 1; day <= lastDay.getDate(); day++) {
      const date = new Date(currentYear, currentMonth, day);
      const dateStr = formatDate(date);
      const dayDiv = document.createElement("div");
      dayDiv.classList.add("date-number");
      dayDiv.textContent = day;

      if (isToday(date)) dayDiv.classList.add("today");

      if (events[dateStr] && Object.keys(events[dateStr]).length > 0) {
        const dot = document.createElement("span");
        const dotColor = isToday(date)? "#28a745" : "#007bff";
        dot.style.cssText = `background:${dotColor};border-radius:50%;width:8px;height:8px;display:inline-block;margin-left:5px;vertical-align:middle;`;
        dayDiv.appendChild(dot);
      }

      dayDiv.addEventListener("click", () => showDailyView(date));
      calendarEl.appendChild(dayDiv);
    }
  }

  function isToday(date) {
    return date.getFullYear() === today.getFullYear() &&
           date.getMonth() === today.getMonth() &&
           date.getDate() === today.getDate();
  }

  function formatDate(date) {
    const offset = date.getTimezoneOffset();
    const local = new Date(date.getTime() - offset * 60000);
    return local.toISOString().split("T")[0];
  }

  function showDailyView(date) {
    calendarView.style.display = "none";
    dailyView.style.display = "block";
    document.getElementById("prevMonth").style.display = "none";
    document.getElementById("nextMonth").style.display = "none";
    selectedDate = date;

    monthYearEl.textContent = date.toLocaleDateString('default', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    renderTasksForDate(date);
  }

  function renderTasksForDate(date) {
    tasksListInner.innerHTML = "";
    const dateStr = formatDate(date);
    const dayEvents = events[dateStr];

    for (let h = 0; h < 24; h++) {
      const line = document.createElement("div");
      line.classList.add("hour-line");
      line.style.top = `${h * 60}px`;

      const label = document.createElement("div");
      label.classList.add("hour-label");
      label.textContent = `${h.toString().padStart(2, '0')}:00`;
      line.appendChild(label);

      tasksListInner.appendChild(line);
    }

    if (!dayEvents || Object.keys(dayEvents).length === 0) {
      tasksList.scrollTop = 6 * 60;
      return;
    }

    const eventArray = Object.entries(dayEvents).map(([id, event]) => {
      const [sh, sm] = event.startTime.split(':').map(Number);
      const [eh, em] = event.endTime.split(':').map(Number);
      return {
        id,
        ...event,
        start: sh * 60 + sm,
        end: eh * 60 + em
      };
    }).sort((a, b) => a.start - b.start || a.end - b.end);

    const columns = [];
    eventArray.forEach(event => {
      let colIndex = 0;
      while (columns[colIndex] !== undefined && columns[colIndex] > event.start) {
        colIndex++;
      }
      event.column = colIndex;
      columns[colIndex] = event.end;
    });

    eventArray.forEach(event => {
      let maxCol = event.column;
      eventArray.forEach(other => {
        if (other.start < event.end && other.end > event.start) {
          maxCol = Math.max(maxCol, other.column);
        }
      });
      event.maxColInGroup = maxCol;
    });

    eventArray.forEach(event => {
      let totalColsInCluster = 1;
      eventArray.forEach(other => {
        if (other.start < event.end && other.end > event.start) {
          totalColsInCluster = Math.max(totalColsInCluster, other.column + 1);
        }
      });

      const duration = event.end - event.start;
      const widthPercent = 100 / totalColsInCluster;
      const leftPercent = event.column * widthPercent;

      const block = document.createElement("div");
      block.classList.add("event-block");
      block.style.top = `${event.start}px`;
      block.style.height = `${duration}px`;
      block.style.left = `calc(50px + ${leftPercent}%)`;
      block.style.width = `calc(${widthPercent}% - 8px)`;
      block.style.background = event.color || "#4285f4";
      block.textContent = `${event.startTime}-${event.endTime} ${event.title}`;
      
      if (duration < 25) {
        block.style.fontSize = "11px";
        block.style.padding = "0px 4px";
      } else if (duration < 40) {
        block.style.fontSize = "12px";
      }

      block.addEventListener("click", () => openDescModal(event.id, event));

      tasksListInner.appendChild(block);
    });

    tasksList.scrollTop = 6 * 60;
  }

  function openDescModal(id, event) {
    let repeatInfo = "";
    if (event.repeatInterval) {
      repeatInfo = ` (Every ${event.repeatInterval} days`;
    } else if (event.repeatDays?.length) {
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      repeatInfo = ` (Repeats: ${event.repeatDays.map(d => dayNames[d]).join(', ')}`;
    }
    if (event.endDate) {
      repeatInfo += ` until ${new Date(event.endDate).toLocaleDateString()}`;
    }
    if (repeatInfo) repeatInfo += ")";

    descTitle.textContent = event.title + " (" + event.startTime + " - " + event.endTime + ")" + repeatInfo;
    descText.innerHTML = (event.description || "No description.").replace(/\n/g, '<br>');
    descModal.style.display = "flex";
    editingEventId = id;
    menuOptions.style.display = "none";
  }

  document.getElementById("closeDescModal").addEventListener("click", () => {
    descModal.style.display = "none";
    editingEventId = null;
  });

  document.getElementById("menuBtn").addEventListener("click", e => {
    e.stopPropagation();
    menuOptions.style.display = menuOptions.style.display === "block"? "none" : "block";
  });

  window.addEventListener("click", () => menuOptions.style.display = "none");

  document.getElementById("editBtn").addEventListener("click", () => {
    if (!editingEventId ||!selectedDate) return;
    const event = events[formatDate(selectedDate)][editingEventId];
    if (!event) return;
    descModal.style.display = "none";
    formModal.style.display = "flex";
    formTitle.textContent = event.repeatGroupId? "Edit Recurring Task" : "Edit Task";
    eventStartTimeInput.value = event.startTime;
    eventEndTimeInput.value = event.endTime;
    eventTitleInput.value = event.title;
    eventColorInput.value = event.color || "#4285f4";
    eventDescInput.value = event.description || "";
    repeatIntervalInput.value = event.repeatInterval || "";
    repeatEndDateInput.value = event.endDate || "";
    document.querySelectorAll('input[name="repeatDays"]').forEach(cb => {
      cb.checked = event.repeatDays?.includes(parseInt(cb.value)) || false;
    });
  });

  document.getElementById("deleteBtn").addEventListener("click", async () => {
    if (!editingEventId ||!selectedDate) return;
    const dateStr = formatDate(selectedDate);
    const currentEvent = events[dateStr]?.[editingEventId];
    if (!currentEvent) return;

    if (currentEvent.repeatGroupId) {
      const deleteAll = confirm(
        "This is a recurring task.\n\n" +
        "• OK = delete the ENTIRE series\n" +
        "• Cancel = delete only this occurrence"
      );
      if (deleteAll) {
        await deleteSeriesByGroupId(currentEvent.repeatGroupId);
      } else {
        await deleteTask(editingEventId);
        delete events[dateStr][editingEventId];
        if (Object.keys(events[dateStr]).length === 0) delete events[dateStr];
      }
    } else {
      await deleteTask(editingEventId);
      delete events[dateStr][editingEventId];
      if (Object.keys(events[dateStr]).length === 0) delete events[dateStr];
    }

    descModal.style.display = "none";
    editingEventId = null;
    renderCalendar();
    showDailyView(selectedDate);
  });

  function resetForm() {
    eventStartTimeInput.value = "";
    eventEndTimeInput.value = "";
    eventTitleInput.value = "";
    eventColorInput.value = "#4285f4";
    eventDescInput.value = "";
    repeatIntervalInput.value = "";
    repeatEndDateInput.value = "";
    document.querySelectorAll('input[name="repeatDays"]').forEach(cb => cb.checked = false);
  }

  backToMonthBtn.addEventListener("click", () => renderCalendar());

  showFormBtn.addEventListener("click", () => {
    formModal.style.display = "flex";
    formTitle.textContent = "Add Task";
    resetForm();
    editingEventId = null;
  });

  cancelFormBtn.addEventListener("click", () => {
    formModal.style.display = "none";
    editingEventId = null;
  });

  formModal.addEventListener("click", (e) => {
    if (e.target === formModal) {
      formModal.style.display = "none";
      editingEventId = null;
    }
  });

  addEventForm.addEventListener("submit", async e => {
    e.preventDefault();
    if (!selectedDate) return;

    const startTime = eventStartTimeInput.value;
    const endTime = eventEndTimeInput.value;
    const title = eventTitleInput.value;
    const color = eventColorInput.value;
    const description = eventDescInput.value;
    const repeatDays = Array.from(document.querySelectorAll('input[name="repeatDays"]:checked'))
      .map(cb => parseInt(cb.value));
    const repeatInterval = parseInt(repeatIntervalInput.value) || null;
    const endDateValue = repeatEndDateInput.value;

    if (endTime <= startTime) {
      alert("End time must be after start time");
      return;
    }

    if (repeatDays.length > 0 && repeatInterval) {
      alert("Please choose either 'Repeat on Days' OR 'Repeat Every X Days', not both.");
      return;
    }

    let endDate = new Date(selectedDate);
    if (endDateValue) {
      endDate = new Date(endDateValue);
      endDate.setMinutes(endDate.getMinutes() + endDate.getTimezoneOffset());
    } else {
      endDate.setFullYear(endDate.getFullYear() + 1);
    }

    if (formatDate(endDate) < formatDate(selectedDate)) {
      alert("End date cannot be before the start date.");
      return;
    }

    if (editingEventId) {
      const dateStr = formatDate(selectedDate);
      const oldEvent = events[dateStr][editingEventId];
      const changes = { startTime, endTime, title, description, color };

      if (oldEvent?.repeatGroupId) {
        const updateAll = confirm(
          "This is a recurring task.\n\n" +
          "• OK = update the ENTIRE series\n" +
          "• Cancel = update only this occurrence"
        );
        if (updateAll) {
          await updateSeriesByGroupId(oldEvent.repeatGroupId, changes);
        } else {
          const updated = {...oldEvent,...changes, repeatGroupId: null, repeatInterval: null, repeatDays: null, endDate: null };
          await saveTask(editingEventId, updated);
          events[dateStr][editingEventId] = updated;
        }
      } else {
        const updated = {...oldEvent,...changes };
        await saveTask(editingEventId, updated);
        events[dateStr][editingEventId] = updated;
      }

    } else if (repeatDays.length > 0) {
      const groupId = crypto.randomUUID();
      const loopDate = new Date(selectedDate);
      const batch = writeBatch(db);

      while (loopDate <= endDate) {
        if (repeatDays.includes(loopDate.getDay())) {
          const dateStr = formatDate(loopDate);
          const id = crypto.randomUUID();
          const taskData = {
            date: dateStr, startTime, endTime, title, description, color,
            repeatGroupId: groupId, repeatDays, endDate: formatDate(endDate)
          };
          batch.set(doc(tasksCol(), id), taskData);
          if (!events[dateStr]) events[dateStr] = {};
          events[dateStr][id] = taskData;
        }
        loopDate.setDate(loopDate.getDate() + 1);
      }
      await batch.commit();

    } else if (repeatInterval && repeatInterval > 0) {
      const groupId = crypto.randomUUID();
      const loopDate = new Date(selectedDate);
      const batch = writeBatch(db);

      while (loopDate <= endDate) {
        const dateStr = formatDate(loopDate);
        const id = crypto.randomUUID();
        const taskData = {
          date: dateStr, startTime, endTime, title, description, color,
          repeatGroupId: groupId, repeatInterval, endDate: formatDate(endDate)
        };
        batch.set(doc(tasksCol(), id), taskData);
        if (!events[dateStr]) events[dateStr] = {};
        events[dateStr][id] = taskData;
        loopDate.setDate(loopDate.getDate() + repeatInterval);
      }
      await batch.commit();

    } else {
      const dateStr = formatDate(selectedDate);
      const id = crypto.randomUUID();
      const taskData = { date: dateStr, startTime, endTime, title, description, color, repeatGroupId: null };
      await saveTask(id, taskData);
      if (!events[dateStr]) events[dateStr] = {};
      events[dateStr][id] = taskData;
    }

    formModal.style.display = "none";
    editingEventId = null;
    renderCalendar();
    showDailyView(selectedDate);
  });

  document.getElementById("prevMonth").addEventListener("click", async () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentUser) await loadMonth(currentYear, currentMonth);
    renderCalendar();
  });

  document.getElementById("nextMonth").addEventListener("click", async () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentUser) await loadMonth(currentYear, currentMonth);
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
