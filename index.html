<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon.png" />
  <base href="/Calendar/">

  <title>Simple Calendar with Smart Repeats</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
    }

    header {
      background: #007bff;
      color: white;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      flex-grow: 1;
      text-align: center;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #ccc;
    }

    .calendar-grid > div {
      background: white;
      padding: 10px;
      text-align: right;
      min-height: 80px;
      cursor: pointer;
    }

    .day-name {
      background: #eee;
      font-weight: bold;
      text-align: center;
    }

    .today {
      background: #d0eaff;
    }

    #dailyView {
      display: none;
      padding: 1rem;
    }

    .taskRow {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    #addEventForm {
      display: none;
      margin-top: 1rem;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
    }

    #descModal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    #descModalContent {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      width: 90%;
      position: relative;
    }

    #menuOptions button:hover {
      background: #f0f0f0;
    }

    #loginDiv {
      padding: 1rem;
      background: #eee;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    #loginDiv input {
      padding: 8px;
      font-size: 16px;
      flex-grow: 1;
      min-width: 180px;
    }

    .repeat-days-container {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .repeat-day-label {
      display: inline-flex;
      align-items: center;
      background: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>

<div id="loginDiv">
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
  <button id="logoutBtn" style="display:none;">Logout</button>
</div>

<div id="appDiv" style="display:none;">

<header>
  <button id="prevMonth">&lt;</button>
  <h1 id="monthYear">Month Year</h1>
  <button id="nextMonth">&gt;</button>
</header>

<div id="calendarView">
  <div class="calendar-grid" id="calendar"></div>
</div>

<div id="dailyView">
  <button id="backToMonth">← Back</button>
  <button id="showFormBtn">+ Add Task</button>

  <div id="tasksList"></div>

  <form id="addEventForm">
    <label>Time</label>
    <input type="time" id="eventTime" required />

    <label>Title</label>
    <input type="text" id="eventTitle" required />

    <label>Description</label>
    <textarea id="eventDesc"></textarea>

    <label>Repeat Days</label>
    <div class="repeat-days-container">
      <label><input type="checkbox" name="repeatDays" value="0">Sun</label>
      <label><input type="checkbox" name="repeatDays" value="1">Mon</label>
      <label><input type="checkbox" name="repeatDays" value="2">Tue</label>
      <label><input type="checkbox" name="repeatDays" value="3">Wed</label>
      <label><input type="checkbox" name="repeatDays" value="4">Thu</label>
      <label><input type="checkbox" name="repeatDays" value="5">Fri</label>
      <label><input type="checkbox" name="repeatDays" value="6">Sat</label>
    </div>

    <button type="submit">Save</button>
  </form>
</div>

<div id="descModal">
  <div id="descModalContent">
    <h3 id="descTitle"></h3>

    <div style="position:relative;">
      <button id="menuBtn">⋯</button>

      <div id="menuOptions"
        style="display:none; position:absolute; right:0; background:white; border:1px solid #ccc; border-radius:6px; min-width:180px;">

        <button id="editBtn" style="width:100%;">Edit</button>
        <button id="deleteOneBtn" style="width:100%;">Delete This Task</button>
        <button id="deleteAllBtn" style="width:100%; color:red;">Delete Entire Series</button>

      </div>
    </div>

    <p id="descText"></p>
    <button id="closeDescModal">Close</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_u0nBXgOfoeK8O9OyZVXlpSF9_v7ovQU",
  authDomain: "calendar-52769.firebaseapp.com",
  projectId: "calendar-52769",
  storageBucket: "calendar-52769.appspot.com",
  messagingSenderId: "780853682335",
  appId: "1:780853682335:web:0fcf319dd572c494bb02aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let events = {};
let selectedDate = null;
let editingEventId = null;

const loginDiv = document.getElementById("loginDiv");
const appDiv = document.getElementById("appDiv");

const calendarEl = document.getElementById("calendar");
const monthYearEl = document.getElementById("monthYear");

const tasksList = document.getElementById("tasksList");

const descModal = document.getElementById("descModal");
const descTitle = document.getElementById("descTitle");
const descText = document.getElementById("descText");

const menuBtn = document.getElementById("menuBtn");
const menuOptions = document.getElementById("menuOptions");

const editBtn = document.getElementById("editBtn");
const deleteOneBtn = document.getElementById("deleteOneBtn");
const deleteAllBtn = document.getElementById("deleteAllBtn");

function formatDate(date) {
  const offset = date.getTimezoneOffset();
  return new Date(date.getTime() - offset * 60000).toISOString().split("T")[0];
}

function renderCalendar() {
  calendarEl.innerHTML = "";
  const today = new Date();

  for (let i = 1; i <= 30; i++) {
    const div = document.createElement("div");
    div.textContent = i;
    div.onclick = () => showDay(new Date(2026, 5, i));
    calendarEl.appendChild(div);
  }
}

function showDay(date) {
  selectedDate = date;
  renderTasks(date);
}

function renderTasks(date) {
  tasksList.innerHTML = "";
  const key = formatDate(date);

  if (!events[key]) return;

  Object.entries(events[key]).forEach(([id, ev]) => {
    const div = document.createElement("div");
    div.className = "taskRow";
    div.textContent = ev.time + " - " + ev.title;
    div.onclick = () => openModal(id, ev);
    tasksList.appendChild(div);
  });
}

function openModal(id, ev) {
  editingEventId = id;
  descTitle.textContent = ev.title;
  descText.textContent = ev.description || "";
  descModal.style.display = "flex";
}

deleteOneBtn.addEventListener("click", async () => {
  const key = formatDate(selectedDate);
  delete events[key][editingEventId];
  await setDoc(doc(db, "calendars", currentUser.uid), events);
  descModal.style.display = "none";
});

deleteAllBtn.addEventListener("click", async () => {
  const key = formatDate(selectedDate);
  const ev = events[key][editingEventId];
  const group = ev.repeatGroupId;

  Object.keys(events).forEach(day => {
    Object.keys(events[day] || {}).forEach(id => {
      if (events[day][id].repeatGroupId === group) {
        delete events[day][id];
      }
    });
  });

  await setDoc(doc(db, "calendars", currentUser.uid), events);
  descModal.style.display = "none";
});

menuBtn.onclick = () => {
  menuOptions.style.display =
    menuOptions.style.display === "block" ? "none" : "block";
};

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    appDiv.style.display = "block";
    loginDiv.style.display = "none";

    const snap = await getDoc(doc(db, "calendars", user.uid));
    events = snap.exists() ? snap.data() : {};

    renderCalendar();
  } else {
    currentUser = null;
    appDiv.style.display = "none";
    loginDiv.style.display = "flex";
  }
});
</script>

</body>
</html>
